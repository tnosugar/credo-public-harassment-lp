<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Credo Legal — LP review hub (32 variants)</title>
<style>
  /* ───── Reset + tokens ───── */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #111418; background: #f6f7f9;
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
  }
  a { color: inherit; }

  /* ───── Top bar ───── */
  .topbar {
    grid-column: 1 / -1;
    background: #111418; color: #fff;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid #2a2f37;
    z-index: 10;
  }
  .brand { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .brand .red { color: #ff6b73; }
  .meta {
    font-size: 12px; color: #c8cdd6;
    display: flex; gap: 18px; align-items: center;
    flex: 1; min-width: 0;
  }
  .meta .slug { color: #fff; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  .meta .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; background: #2a2f37; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.02em; text-transform: uppercase;
  }
  .meta .pill.champ { background: #c92028; }
  .meta .pill.allstates { background: #5b6470; }
  .toolbar { display: flex; gap: 10px; align-items: center; }
  .toolbar a, .toolbar button {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: #c8cdd6; background: none; border: 1px solid #2a2f37;
    padding: 6px 12px; cursor: pointer; text-decoration: none; transition: all .15s;
  }
  .toolbar a:hover, .toolbar button:hover { color: #fff; border-color: #5b6470; }
  .toolbar a.live { color: #ff6b73; border-color: #ff6b73; }
  .toolbar a.live:hover { background: #ff6b73; color: #111418; }

  /* Image-mix toggle (added 2026-06-24).
     Lets reviewers swap Sarah / Michael in the hero + whoHelps slots without
     leaving the hub. The current mix is appended to every iframe URL as
     ?hero=w|m&who=w|m and persists in localStorage across LP switches + reloads. */
  .mix {
    display: inline-flex; gap: 4px; align-items: center;
    margin-right: 8px; padding: 3px; background: #1a1e25;
    border: 1px solid #2a2f37; border-radius: 2px;
  }
  .mix-label {
    font-size: 9px; letter-spacing: 0.1em; color: #8590a0; text-transform: uppercase;
    padding: 0 8px 0 4px; font-weight: 600;
  }
  .mix button {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    color: #8590a0; background: transparent; border: 0; padding: 4px 9px;
    cursor: pointer; transition: all .12s; font-family: ui-monospace, Menlo, monospace;
  }
  .mix button:hover { color: #fff; }
  .mix button.active { color: #fff; background: #c92028; }
  .mix .sep { color: #2a2f37; font-size: 10px; padding: 0 2px; }
  @media (max-width: 1200px) { .mix-label { display: none; } }

  /* ───── Sidebar ───── */
  .sidebar {
    background: #fff; border-right: 1px solid #e7eaee;
    overflow-y: auto; padding: 12px 0 60px;
  }
  .search {
    position: sticky; top: 0; z-index: 5; background: #fff;
    padding: 10px 16px; border-bottom: 1px solid #f1f3f5;
  }
  .search input {
    width: 100%; padding: 9px 12px; border: 1.5px solid #e7eaee;
    font-size: 13px; font-family: inherit; outline: none;
    transition: border-color .15s;
  }
  .search input:focus { border-color: #c92028; }
  .progress {
    font-family: ui-monospace, Menlo, monospace; font-size: 10px;
    color: #8590a0; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 8px 16px 4px;
  }
  .cluster-h {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #c92028;
    padding: 16px 16px 6px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .cluster-h .count {
    color: #8590a0; font-weight: 500; font-size: 10px;
    letter-spacing: 0.06em;
  }
  .lp-link {
    display: block; padding: 9px 16px;
    text-decoration: none; color: #111418; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .lp-link:hover { background: #fafbfc; }
  .lp-link.active { background: #fdeced; border-left-color: #c92028; }
  .lp-link .num {
    font-family: ui-monospace, Menlo, monospace; font-size: 10px;
    color: #8590a0; margin-right: 8px;
  }
  .lp-link.active .num { color: #c92028; font-weight: 700; }
  .lp-link .label { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .lp-link .slug {
    font-family: ui-monospace, Menlo, monospace; font-size: 10.5px;
    color: #5b6470; margin-top: 3px; word-break: break-all;
  }
  .lp-link .badges { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
  .lp-link .b {
    font-size: 9px; padding: 1px 6px; background: #f1f3f5;
    color: #5b6470; border-radius: 3px; letter-spacing: 0.04em;
    text-transform: uppercase; font-weight: 600;
  }
  .lp-link .b.champion { background: #c92028; color: #fff; }
  .lp-link .b.fixed { background: #fff7ed; color: #9a3412; }
  .lp-link .b.new-section { background: #ecfeff; color: #155e75; }

  /* ───── Frame ───── */
  .frame-wrap { background: #f6f7f9; position: relative; overflow: hidden; }
  iframe {
    width: 100%; height: 100%; border: 0; background: #fff; display: block;
  }
  .empty {
    height: 100%; display: flex; align-items: center; justify-content: center;
    color: #8590a0; font-size: 14px;
  }

  /* ───── Help (lives in the top bar so it doesn't overlap the
            LP's bottom-right chat widget) ───── */
  .kb {
    font-size: 10px; color: #8590a0; letter-spacing: 0.06em;
    text-transform: uppercase; white-space: nowrap;
    padding: 4px 8px; border: 1px solid #2a2f37;
    user-select: none;
  }
  .kb kbd {
    display: inline-block; padding: 1px 5px; margin: 0 2px;
    background: #2a2f37; border: 1px solid #2a2f37; font-size: 9px;
    font-family: ui-monospace, Menlo, monospace; color: #c8cdd6;
  }
  @media (max-width: 1080px) { .kb { display: none; } }
</style>

<script>

  { c:"Lawsuit", n:"Served Papers — Explore Options",       slug:"/debt-lawsuit-options",                 phone:"(347) 523-4662", file:"lawsuit-options-locked-paired-portrait-noborders.html",        angle:"Reassurance", fixed:["CP 5→6"] },

  { c:"Lawsuit", n:"Served Papers — Act Today",             slug:"/debt-lawsuit-summons-respond",         phone:"(347) 523-4662", file:"lawsuit-summons-locked-paired-portrait-noborders.html",        angle:"Urgent action", fixed:["Subhead typo","FAQ rewrite","Voice ×4"] },

  { c:"Garnishment", n:"Fight Active Garnishment",          slug:"/wage-garnishment-attorney",            phone:"(720) 414-1751", file:"garn-attorney-locked-paired-portrait-noborders.html",          angle:"Post-judgment fight", fixed:["Spacing bugs","Label-only","Bottom CTA","CP+YR 5→6"], newSection:true },
  { c:"Garnishment", n:"Claim Your Exemptions",             slug:"/wage-garnishment-exemptions",          phone:"(720) 414-1751", file:"garn-exemptions-locked-paired-portrait-noborders.html",        angle:"Exemptions", fixed:["Label-only","Concat HIW","CP+YR+FAQ counts","Bottom CTA"], newSection:true },
  { c:"Garnishment", n:"Prevention — Stop It First",        slug:"/wage-garnishment-prevention",          phone:"(720) 414-1751", file:"garn-prevention-locked-paired-portrait-noborders.html",        angle:"Pre-judgment prevention", fixed:["Subhead mismatch","Spacing","Label-only","Counts","Bottom CTA"] },

  // ──── Payday Loan (6) ────
  { c:"Payday Loan", n:"Stop the Calls",                    slug:"/payday-loan-debt-harassment",          phone:"(407) 512-0808", file:"payday-harassment-locked-paired-portrait-noborders.html",      angle:"Stop calls", fixed:["Subhead mismatch","Voice"] },
  { c:"Payday Loan", n:"Rights Education",                  slug:"/payday-loan-debt-rights",              phone:"(347) 744-9014", file:"payday-rights-locked-paired-portrait-noborders.html",          angle:"Education" },
  { c:"Payday Loan", n:"Violations Payoff",                 slug:"/payday-loan-debt-violations",          phone:"(407) 512-0808", file:"payday-violations-locked-paired-portrait-noborders.html",      angle:"Make them pay", fixed:["Subhead missing","Voice"] },
  { c:"Payday Loan", n:"Use Your Rights — Fight Back",      slug:"/payday-loan-fight-back",               phone:"(347) 744-9014", file:"payday-fight-back-locked-paired-portrait-noborders.html",      angle:"Active claims" },
  { c:"Payday Loan", n:"Lawsuit — Proof Challenge",         slug:"/payday-loan-lawsuit-proof",            phone:"(347) 744-9014", file:"payday-lawsuit-proof-locked-paired-portrait-noborders.html",   angle:"Proof challenge" },
  { c:"Payday Loan", n:"Lawsuit — Respond on Time",         slug:"/payday-loan-lawsuit-respond",          phone:"(347) 744-9014", file:"payday-lawsuit-respond-locked-paired-portrait-noborders.html", angle:"Deadline urgency" },

  // ──── Medical Debt (4) ────
  { c:"Medical Debt", n:"Lawsuit — Billing Errors",         slug:"/medical-debt-bills-errors",            phone:"(612) 260-9170", file:"med-bills-errors-locked-paired-portrait-noborders.html",       angle:"Billing errors" },
  { c:"Medical Debt", n:"Credit Report Removal",            slug:"/medical-debt-credit-report-removal",   phone:"(347) 744-9014", file:"med-credit-report-locked-paired-portrait-noborders.html",      angle:"Credit cleanup" },
  { c:"Medical Debt", n:"Rights Education",                 slug:"/medical-debt-fdcpa-rights",            phone:"(347) 744-9014", file:"med-fdcpa-rights-locked-paired-portrait-noborders.html",       angle:"Education", fixed:["WWD 3→4"] },
  { c:"Medical Debt", n:"Lawsuit — Respond on Time",        slug:"/medical-debt-lawsuit-respond",         phone:"(612) 260-9170", file:"med-lawsuit-respond-locked-paired-portrait-noborders.html",    angle:"Deadline urgency", fixed:["Multiple typos"] },

  // ──── Credit Card (6) ────
  { c:"Credit Card", n:"Negotiation — Challenge Validity",  slug:"/credit-card-debt-challenge",           phone:"(646) 952-7404", file:"cc-challenge-locked-paired-portrait-noborders.html",          angle:"Challenge", fixed:["MISSING Why Choose"], newSection:true },
  { c:"Credit Card", n:"Lawsuit — Proof / Records",         slug:"/credit-card-debt-lawsuit-records",     phone:"(646) 952-7380", file:"cc-lawsuit-records-locked-paired-portrait-noborders.html",    angle:"Proof challenge", fixed:["Label-only","CP+FAQ counts","Bottom CTA"] },
  { c:"Credit Card", n:"Lawsuit — Respond on Time",         slug:"/credit-card-debt-lawsuit-respond",     phone:"(646) 952-7380", file:"cc-lawsuit-respond-locked-paired-portrait-noborders.html",    angle:"Deadline urgency", fixed:["H1 casing","Label-only","Counts","CTAs"] },
  { c:"Credit Card", n:"Negotiation — Negotiate Down",      slug:"/credit-card-debt-negotiation",         phone:"(646) 952-7404", file:"cc-negotiation-locked-paired-portrait-noborders.html",        angle:"Negotiate" },
  { c:"Credit Card", n:"Harassment — Stop Calls",           slug:"/credit-card-debt-stop-calls",          phone:"(646) 952-7392", file:"cc-stop-calls-locked-paired-portrait-noborders.html",         angle:"Stop calls", fixed:["Label-only","Counts","Voice ×2"] },
  { c:"Credit Card", n:"Harassment — $1,000 Per Violation", slug:"/credit-card-debt-violations",          phone:"(646) 952-7392", file:"cc-violations-locked-paired-portrait-noborders.html",         angle:"Make them pay", fixed:["Label-only","Voice ×3","Bottom CTA"] },

  // ──── All-States overlay (1) ────
  { c:"All-States", n:"FDCPA — Act Fast (overlay)",         slug:"/debt-harassment-act-fast",             phone:"(718) 865-8350", file:"act-fast-locked-paired-portrait-noborders.html",              angle:"Cross-vertical FDCPA", allstates:true, fixed:["Non-std hero","Filler","Missing Call link"] },
];

const CLUSTERS = ["Harassment","Lawsuit","Garnishment","Payday Loan","Medical Debt","Credit Card","All-States"];

/* ───── Render ───── */
const $list = document.getElementById('list');
const $frame = document.getElementById('frame');
const $empty = document.getElementById('empty');
const $q = document.getElementById('q');
const $prog = document.getElementById('progress');

function renderList(filter) {
  $list.innerHTML = '';
  let count = 0;
  CLUSTERS.forEach(cluster => {
    const items = LPS.filter(lp => lp.c === cluster && (!filter || matches(lp, filter)));
    if (!items.length) return;
    const header = document.createElement('div');
    header.className = 'cluster-h';
    header.innerHTML = `${cluster}<span class="count">${items.length}</span>`;
    $list.appendChild(header);
    items.forEach(lp => {
      const idx = LPS.indexOf(lp);
      const a = document.createElement('a');
      a.className = 'lp-link';
      a.dataset.idx = idx;
      a.href = '#' + idx;
      // Sidebar badges: 'Champion' and the 'N fixes' counter were removed
      // 2026-06-24 to clean visual noise from the LP navigation list. The
      // top-bar 'CHAMPION' pill (selection metadata) still appears when the
      // selected LP is a champion. 'New section' badge retained.
      const badges = [];
      if (lp.newSection) badges.push('<span class="b new-section">New section</span>');
      a.innerHTML = `
        <div><span class="num">${String(idx+1).padStart(2,'0')}</span><span class="label">${lp.n}</span></div>
        <div class="slug">${lp.slug}</div>
        ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
      `;
      a.addEventListener('click', e => { e.preventDefault(); select(idx); });
      $list.appendChild(a);
      count++;
    });
  });
  $prog.textContent = filter ? `${count} of ${LPS.length} match` : `${LPS.length} variants · ${CLUSTERS.length} clusters`;
}

function matches(lp, f) {
  const q = f.toLowerCase();
  return lp.n.toLowerCase().includes(q)
      || lp.slug.toLowerCase().includes(q)
      || lp.c.toLowerCase().includes(q)
      || (lp.angle || '').toLowerCase().includes(q)
      || lp.phone.includes(q);
}

let current = -1;
/* Hub-to-LP review-mode propagation: if the hub itself is in review mode
 * (?review=1 in the hub URL), pass it through to the iframe + "Open ↗" link
 * so the LP loads the widget too. Reviewers can comment on any LP they
 * navigate to via the hub without having to manually edit the URL. */
const HUB_IN_REVIEW = new URLSearchParams(location.search).get('review') === '1';

/* Image-mix state (added 2026-06-24).
 * Each LP can be previewed in any of 4 hero/whoHelps subject combinations.
 * State persists across LP switches and reloads via localStorage. The LP
 * renderer (app.js) honours ?hero=w|m and ?who=w|m on every page. */
const MIX_KEY = 'credo-review-hub-mix';
let mixHero = 'w', mixWho = 'w';
try {
  const saved = (localStorage.getItem(MIX_KEY) || '').split('-');
  if (saved.length === 2 && (saved[0] === 'w' || saved[0] === 'm') && (saved[1] === 'w' || saved[1] === 'm')) {
    mixHero = saved[0]; mixWho = saved[1];
  }
} catch (e) { /* localStorage blocked — fall back to defaults */ }

function withParams(href) {
  const parts = [];
  if (HUB_IN_REVIEW) parts.push('review=1');
  if (mixHero === 'm') parts.push('hero=m');
  if (mixWho === 'm')  parts.push('who=m');
  if (!parts.length) return href;
  return href + (href.indexOf('?') < 0 ? '?' : '&') + parts.join('&');
}
// Back-compat alias for any code paths still calling withReviewFlag().
const withReviewFlag = withParams;

function setMix(hero, who) {
  mixHero = hero; mixWho = who;
  try { localStorage.setItem(MIX_KEY, hero + '-' + who); } catch (e) {}
  // Repaint toggle highlight.
  document.querySelectorAll('.mix button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mix === hero + '-' + who);
  });
  // Re-render current LP if one is selected (with cache-busting via timestamp,
  // so the iframe definitely reloads with the new query string).
  if (current >= 0) select(current);
}
document.getElementById('mix').addEventListener('click', e => {
  const btn = e.target.closest('button[data-mix]');
  if (!btn) return;
  const [h, w] = btn.dataset.mix.split('-');
  setMix(h, w);
});
function select(idx) {
  if (idx < 0 || idx >= LPS.length) return;
  current = idx;
  const lp = LPS[idx];
  $empty.style.display = 'none';
  $frame.style.display = 'block';
  $frame.src = withParams(lp.file);
  document.getElementById('m-cluster').textContent = lp.c;
  document.getElementById('m-slug').textContent = lp.slug;
  document.getElementById('m-phone').textContent = lp.phone;
  const angleEl = document.getElementById('m-angle');
  angleEl.textContent = lp.angle || '';
  angleEl.style.display = lp.angle ? 'inline-flex' : 'none';
  document.getElementById('m-champ').style.display = lp.champion ? 'inline-flex' : 'none';
  const open = document.getElementById('t-open');
  open.href = withParams(lp.file); open.style.display = 'inline-flex';
  const live = document.getElementById('t-live');
  live.href = 'https://start.credolegal.com' + lp.slug; live.style.display = 'inline-flex';
  // sidebar highlight
  document.querySelectorAll('.lp-link').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.idx) === idx);
  });
  // scroll active into view
  const activeEl = document.querySelector('.lp-link.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
  // update URL hash
  history.replaceState(null, '', '#' + idx);
}

/* Keyboard nav */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowDown') { e.preventDefault(); select(Math.min(LPS.length - 1, current + 1)); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); select(Math.max(0, current - 1)); }
  if (e.key === '/')         { e.preventDefault(); $q.focus(); }
});

$q.addEventListener('input', () => renderList($q.value.trim()));

/* Initial render + hash route */
renderList('');
// Paint the persisted mix button so users can see which combination is active.
document.querySelectorAll('.mix button').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.mix === mixHero + '-' + mixWho);
});
const hashIdx = parseInt(location.hash.slice(1), 10);
if (!Number.isNaN(hashIdx) && hashIdx >= 0 && hashIdx < LPS.length) {
  select(hashIdx);
}
